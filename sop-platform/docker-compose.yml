# ============================================================
# SOP Automation Platform — Docker Compose
# 3 local containers + 3 external services:
#   - Database:  Supabase (PostgreSQL via transaction pooler, port 6543)
#   - Pipelines: n8n (hosted externally, webhook communication)
#   - Access:    Cloudflare Tunnel (runs as host daemon, not container)
#
# Run: docker compose up --build
# Dev: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# ============================================================

services:

  # ──────────────────────────────────────────────────────────
  # React SPA — Vite dev server (dev) / serve static (prod)
  # Cloudflare Tunnel sideloads this to the internet at
  # https://sop.yourdomain.com → localhost:5173
  # ──────────────────────────────────────────────────────────
  sop-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    container_name: sop-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    ports:
      - "5173:5173"
    networks:
      - sop-network

  # ──────────────────────────────────────────────────────────
  # FastAPI — Backend REST API + export generation
  # Connects to Supabase (external PostgreSQL, port 6543)
  # Cloudflare Tunnel exposes at https://api.sop.yourdomain.com
  # ──────────────────────────────────────────────────────────
  sop-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: sop-api
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      AZURE_BLOB_BASE_URL: ${AZURE_BLOB_BASE_URL:-}
      AZURE_BLOB_SAS_TOKEN: ${AZURE_BLOB_SAS_TOKEN:-}
      N8N_WEBHOOK_BASE_URL: ${N8N_WEBHOOK_BASE_URL:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_VISION_API_KEY: ${GOOGLE_VISION_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - sop-network

  # ──────────────────────────────────────────────────────────
  # Frame Extractor — FFmpeg + PySceneDetect + Mermaid CLI
  # ──────────────────────────────────────────────────────────
  sop-extractor:
    build:
      context: ./extractor
      dockerfile: Dockerfile
    container_name: sop-extractor
    ports:
      - "8001:8001"
    volumes:
      - ./data:/data
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - sop-network

  # ──────────────────────────────────────────────────────────
  # Cloudflare Tunnel — exposes sop-extractor to n8n (external)
  #
  # Route configured by TL in Cloudflare Zero Trust dashboard:
  #   extractor.yourdomain.com → http://sop-extractor:8001
  #
  # Phase 6: TL adds 2 more routes (no rebuild needed):
  #   api.yourdomain.com → http://sop-api:8000
  #   sop.yourdomain.com → http://sop-frontend:5173
  #
  # IMPORTANT: use 'command', not 'entrypoint' — matches cloudflared ENTRYPOINT
  # ──────────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: sop-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - sop-extractor
    network_mode: "host"

# ──────────────────────────────────────────────────────────
networks:
  sop-network:
    driver: bridge
